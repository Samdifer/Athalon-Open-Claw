name: Internal Routes Gate

on:
  pull_request:
    paths:
      - "athelon-app/**"
      - ".github/workflows/internal-routes-gate.yml"
  workflow_dispatch:

jobs:
  wave-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: athelon-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: athelon-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Write CI .env.local
        run: |
          cat > .env.local << 'EOF'
          VITE_CONVEX_URL=${{ secrets.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          PLAYWRIGHT_UNLINKED_EMAIL=${{ secrets.PLAYWRIGHT_UNLINKED_EMAIL }}
          PLAYWRIGHT_EMPTY_ORG_EMAIL=${{ secrets.PLAYWRIGHT_EMPTY_ORG_EMAIL }}
          PLAYWRIGHT_SEEDED_EMAIL=${{ secrets.PLAYWRIGHT_SEEDED_EMAIL }}
          EOF

      - name: Validate required gate secrets
        run: |
          required=(
            VITE_CONVEX_URL
            VITE_CLERK_PUBLISHABLE_KEY
            CLERK_SECRET_KEY
            PLAYWRIGHT_UNLINKED_EMAIL
            PLAYWRIGHT_EMPTY_ORG_EMAIL
            PLAYWRIGHT_SEEDED_EMAIL
          )
          for key in "${required[@]}"; do
            if ! grep -Eq "^${key}=.+" .env.local; then
              echo "Missing required value for ${key}"
              exit 1
            fi
          done

      - name: Run first-user gate
        run: npm run qa:first-user-gate

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: athelon-app/playwright-report
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: athelon-app/test-results
          retention-days: 14
